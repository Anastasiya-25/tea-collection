  <div id="carouselExample" class="carousel slide">
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="../../../assets/images/tea1.png" class="d-block w-100" alt="...">
      </div>
      <div class="carousel-item">
        <img src="../../../assets/images/tea2.png" class="d-block w-100" alt="...">
      </div>
      <div class="carousel-item">
        <img src="../../../assets/images/tea3.png" class="d-block w-100" alt="...">
      </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">

          <clipPath id="clip0_3910_130">
            <rect width="19.9396" height="20" fill="white"
                  transform="matrix(1 0 2.22607e-08 -1 10.1389 30)"/>
          </clipPath>
        </defs>
      </svg>
      <span class="visually-hidden">Next</span>
    </button>
  </div>
  <div class="container w-75">
    <p class="fs-3 fw-bold text-center m-5">Ответы на часто задаваемые вопросы</p>
    <div class="accordion" id="accordionExample">

      <div class="accordion-item" *ngFor="let answer of answers; let i = index">
        <h2 class="accordion-header">
          <button class="accordion-button d-flex justify-content-between align-items-center"
                  type="button"
                  [class.collapsed]="openIndex !== i"
                  (click)="toggleAccordion(i)">

            <span>{{ answer.question }}</span>
          </button>
        </h2>

        <div class="accordion-collapse collapse" [class.show]="openIndex === i">
          <div class="accordion-body">
            <p class="m-0">{{ answer.answer }}</p>
          </div>
        </div>

      </div>

    </div>
  </div>

  <ng-template #modal let-modal>
      <div class="modal-header border-0 justify-content-end pb-0">
        <button type="button" class="btn-close" aria-label="Close" (click)="modal.dismiss('Cross click')"></button>
      </div>

      <div class="modal-body pt-0 text-center p-3">
        <div class="text-primary mb-3">
          <i class="bi bi-cup-hot fs-1"></i></div>

        <h4 class="modal-title fw-bold mb-3" id="welcomeModalLabel">Добро пожаловать!</h4>
        <p class="text-muted fs-5">Посмотрите наши чайные коллекции</p>
      </div>

      <div class="modal-footer border-0 justify-content-center pt-0">
        <a [routerLink]="['/tea-collection']" (click)="modal.close()"
           class="btn btn-primary btn-lg px-5 hvr-float-shadow">
          Смотреть
        </a>
      </div>

  </ng-template>
</div>
